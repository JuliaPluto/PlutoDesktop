<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Pluto.jl Desktop</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
          sans-serif;
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: Canvas;
        color: CanvasText;
      }

      main {
        display: grid;
        gap: 1rem;
        justify-items: center;
        padding: 2rem;
        text-align: center;
      }

      p {
        margin: 0;
        font-size: 1rem;
      }

      progress {
        width: min(18rem, 70vw);
      }
    </style>
  </head>
  <body>
    <main>
      <p>Starting Julia and loading the Pluto server... This can take 5 minutes, hang tight!</p>
      <progress aria-label="Loading the Pluto.jl Julia server"></progress>
    </main>
  </body>
</html>
